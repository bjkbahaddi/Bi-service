<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Subscriptions Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .subscription {
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 15px 0;
            padding: 15px;
        }
        .button {
            background: #0073e6;
            color: #fff;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }
        .button:hover {
            background: #005bb5;
        }
    </style>
</head>
<body>
    <h1>Digital Subscriptions Store</h1>
    <div class="subscription">
        <h2>Netflix</h2>
        <a href="https://wa.me/your-number" class="button">Subscribe via WhatsApp</a>
    </div>
    <div class="subscription">
        <h2>YouTube</h2>
        <a href="https://wa.me/your-number" class="button">Subscribe via WhatsApp</a>
    </div>
    <div class="subscription">
        <h2>Spotify</h2>
        <a href="https://wa.me/your-number" class="button">Subscribe via WhatsApp</a>
    </div>
    <div class="subscription">
        <h2>Amazon Prime Video</h2>
        <a href="https://wa.me/your-number" class="button">Subscribe via WhatsApp</a>
    </div>
</body>
</html>
